name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Shared kernel ────────────────────────────────────────────────────────────
  test-shared:
    name: Test shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install workspace deps
        run: uv sync --all-packages
      - name: Run shared tests
        run: uv run pytest shared/tests/ -v
      - name: Lint shared
        run: uv run ruff check shared/

  # ── Domain tests (parallelised via matrix) ───────────────────────────────────
  test-domains:
    name: Test domain — ${{ matrix.domain }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        domain:
          - identity
          - auth
          - presentation
          - style
          - content
          - rendering
          - media
          - web_access
          - export
          - agent
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install workspace deps
        run: uv sync --all-packages
      - name: Run tests for ${{ matrix.domain }}
        run: uv run pytest domains/${{ matrix.domain }}/tests/ -v

  # ── Gateway tests ─────────────────────────────────────────────────────────────
  test-gateway:
    name: Test gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install workspace deps
        run: uv sync --all-packages
      - name: Run gateway tests
        run: uv run pytest gateway/tests/ -v

  # ── Lint & format ─────────────────────────────────────────────────────────────
  lint:
    name: Ruff lint & format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install workspace deps
        run: uv sync --all-packages
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  # ── Type check ───────────────────────────────────────────────────────────────
  typecheck:
    name: Mypy type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install workspace deps
        run: uv sync --all-packages
      - name: Run mypy
        run: uv run mypy shared/ domains/ gateway/ --ignore-missing-imports

  # ── Docker build (gated on all tests passing) ────────────────────────────────
  docker-build:
    name: Docker Compose build
    runs-on: ubuntu-latest
    needs: [test-shared, test-domains, test-gateway, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copy env file
        run: cp .env.example .env

      - name: Build all images
        run: docker compose build --parallel
