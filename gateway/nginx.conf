##############################################################################
# Presenton — nginx reverse proxy
##############################################################################

# Per-IP rate limiting zone (10 MB shared memory, 30 req/s burst capacity)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

##############################################################################
# Upstream definitions
##############################################################################
upstream presentation  { server presentation:8010; }
upstream style         { server style:8020; }
upstream content       { server content:8030; }
upstream rendering     { server rendering:8040; }
upstream media         { server media:8050; }
upstream agent         { server agent:8060; }
upstream auth          { server auth:8070; }
upstream identity      { server identity:8080; }
upstream web_access    { server web_access:8090; }
upstream export        { server export:8100; }
upstream mcp_gateway   { server mcp_gateway:8001; }
upstream frontend      { server frontend:3000; }

##############################################################################
# Helper map — extract WebSocket upgrade header
##############################################################################
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Maximum request body (e.g. file uploads)
    client_max_body_size 100m;

    ##########################################################################
    # Global CORS headers (pre-flight handled per location)
    ##########################################################################
    add_header Access-Control-Allow-Origin  "$http_origin" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Request-Id" always;
    add_header Access-Control-Allow-Credentials "true" always;

    ##########################################################################
    # OPTIONS pre-flight — respond immediately
    ##########################################################################
    if ($request_method = OPTIONS) {
        return 204;
    }

    ##########################################################################
    # MCP Gateway  (SSE / WebSocket)
    ##########################################################################
    location /mcp {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://mcp_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE / WebSocket support
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
        chunked_transfer_encoding on;
    }

    ##########################################################################
    # Domain API routes
    ##########################################################################
    location /api/v1/presentations/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://presentation/api/v1/presentations/;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/v1/styles/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://style/api/v1/styles/;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/v1/content/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://content/api/v1/content/;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/v1/rendering/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://rendering/api/v1/rendering/;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/v1/media/ {
        limit_req zone=api_limit burst=20 nodelay;
        # Larger body for file uploads
        client_max_body_size 500m;
        proxy_pass http://media/api/v1/media/;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/v1/agents/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass         http://agent/api/v1/agents/;
        include            /etc/nginx/proxy_params.conf;
        # Long-running agent streaming
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }

    location /api/v1/auth/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://auth/api/v1/auth/;
        include /etc/nginx/proxy_params.conf;
    }

    # Public identity paths (login / register) — no internal auth needed
    location /api/v1/identity/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://identity/api/v1/identity/;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/v1/web/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://web_access/api/v1/web/;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/v1/export/ {
        limit_req zone=api_limit burst=10 nodelay;
        # Larger responses for exported files
        client_max_body_size 500m;
        proxy_pass         http://export/api/v1/export/;
        include            /etc/nginx/proxy_params.conf;
        proxy_read_timeout 300s;
    }

    ##########################################################################
    # Static files served by the frontend — auth via sub-request (optional)
    ##########################################################################
    location /static/ {
        proxy_pass         http://frontend/static/;
        proxy_cache_valid  200 1d;
        add_header         Cache-Control "public, max-age=86400, immutable";
    }

    ##########################################################################
    # Frontend catch-all
    ##########################################################################
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket (HMR in dev)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
    }

    ##########################################################################
    # Health check (nginx self)
    ##########################################################################
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
